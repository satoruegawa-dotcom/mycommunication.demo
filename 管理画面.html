<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECA AI Studio - Creative Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ["class"],
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
                        secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
                        muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
                        accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
                        card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
                    },
                    borderRadius: { lg: "var(--radius)", md: "calc(var(--radius) - 2px)", sm: "calc(var(--radius) - 4px)" },
                },
            },
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --border: 214.3 31.8% 91.4%;
            --radius: 0.5rem;
        }
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        ::-webkit-scrollbar-track { background: transparent; }

        .channel-radio:checked ~ .channel-card { border-color: #111827; box-shadow: 0 0 0 1px #111827; background-color: #f9fafb; }
        .channel-radio:checked ~ .channel-card .channel-label { color: #111827; font-weight: 700; }

        .ratio-checkbox:checked ~ .ratio-card { border-color: #111827; box-shadow: 0 0 0 1px #111827; background-color: #f9fafb; }
        .ratio-checkbox:checked ~ .ratio-card .ratio-label { color: #111827; font-weight: 700; }
        .ratio-checkbox:checked ~ .ratio-card .ratio-rect { stroke: #111827; }

        .tag-item { display: inline-flex; align-items: center; gap: 4px; background: #111827; color: white; border-radius: 9999px; padding: 3px 10px; font-size: 13px; font-weight: 500; }
        .tag-item button { line-height: 1; color: rgba(255,255,255,0.7); }
        .tag-item button:hover { color: white; }
    </style>
</head>
<body class="bg-white text-foreground antialiased overflow-hidden">
<div class="flex h-screen w-full">

    <!-- サイドバー -->
    <div class="w-20 h-screen bg-white border-r flex flex-col flex-shrink-0 z-20">
        <div class="h-20 flex items-center justify-center border-b">
            <img src="https://deca-custom-nmcm-web.vercel.app/deca-x-logo.svg" alt="Logo" class="w-10">
        </div>
        <div class="flex-1 py-6 flex flex-col gap-4 items-center">
            <a href="#" class="w-14 h-14 rounded-lg flex items-center justify-center transition-colors bg-gray-100 text-gray-900 shadow-inner" title="ダッシュボード">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>

            </a>
        </div>
        <div class="flex flex-col items-center border-t py-4">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-200">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User" class="w-full h-full">
            </div>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="flex-1 overflow-hidden relative bg-gray-50/30">
        <div class="h-full overflow-y-auto">
            <div class="max-w-[1280px] mx-auto p-6 pb-12 space-y-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-gray-900">クリエイティブ管理</h1>
                    <button onclick="toggleModal(true)" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4 py-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        新規作成
                    </button>
                </div>

                <div class="flex gap-4 items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <div class="relative flex-1 max-w-md">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-2.5 text-gray-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input class="flex h-9 w-full rounded-md border border-gray-200 bg-gray-50 px-3 py-1 text-sm transition-colors pl-9 focus:ring-1 focus:ring-primary focus:border-primary outline-none" placeholder="ワークフロー名、キーワードで検索...">
                    </div>
                </div>

                <div id="card-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- 新規作成カード -->
                    <div onclick="toggleModal(true)" class="rounded-[14px] border-2 border-dashed border-gray-300 bg-white shadow-sm h-[307px] cursor-pointer hover:bg-gray-50 hover:border-gray-400 transition-all flex flex-col items-center justify-center group">
                        <div class="w-16 h-16 rounded-full bg-white border shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-700 mb-1">新規作成</h3>
                        <p class="text-sm text-gray-500 text-center">AIを利用して新しいクリエイティブを生成</p>
                    </div>
                    <!-- 完了済みカード -->
                    <div onclick="openDetailPage()" class="border shadow-sm h-[307px] cursor-pointer hover:shadow-md hover:-translate-y-1 transition-all bg-white border-gray-200 rounded-[14px]">
                        <div class="p-[25px] flex flex-col gap-[24px] h-full">
                            <div class="flex justify-between items-start">
                                <h3 class="text-[16px] font-bold text-gray-900 leading-[22px] line-clamp-2 pr-2">定常_広告用バナー_1:1</h3>
                                <div class="bg-gray-900 rounded-[8px] px-[9px] py-[3px] flex-shrink-0"><span class="text-[12px] text-white leading-[16px] font-medium">生成完了</span></div>
                            </div>
                            <div class="flex flex-col gap-[12px] flex-1 min-h-0">
                                <div class="flex items-center gap-3 text-[13px] text-gray-500 flex-wrap">
                                    <span class="inline-flex items-center gap-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                        配信日: 2026-06-09
                                    </span>
                                    <span class="bg-gray-100 px-2 py-0.5 rounded text-[11px]">1:1</span>
                                </div>
                                <p class="text-[14px] text-gray-600 leading-[22px] line-clamp-4">かかりつけプランLPを解析し、若年・見直し・子育て世代の3ペルソナに対してバナークリエイティブを生成。</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- オーバーレイ -->
<div id="modal-overlay" class="fixed inset-0 z-[55] bg-gray-900/60 backdrop-blur-sm hidden" onclick="toggleModal(false)"></div>

<!-- ドロワー -->
<div id="modal-drawer" class="fixed inset-y-0 right-0 z-[60] flex items-stretch transition-transform duration-300 translate-x-full shadow-2xl">
    <div class="w-full bg-gray-50 h-full flex flex-col overflow-hidden sm:w-[520px] md:w-[660px] lg:w-[760px]">

        <div class="flex items-center justify-between p-6 border-b border-gray-200 bg-white flex-shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gray-900 flex items-center justify-center text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-900">新規作成</h2>
                    <p class="text-xs text-gray-500 mt-0.5">AIがターゲットに最適なクリエイティブを生成します</p>
                </div>
            </div>
            <button onclick="toggleModal(false)" class="text-gray-400 hover:bg-gray-100 hover:text-gray-900 rounded-full p-2 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <div class="p-6 overflow-y-auto flex-1 bg-gray-50">
            <form id="create-form" class="space-y-8" onsubmit="handleCreate(event)">

                <div class="space-y-3">
                    <label class="text-sm font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-gray-200 text-gray-700 w-5 h-5 rounded-full inline-flex items-center justify-center text-xs font-bold">1</span>
                        配信名（管理用）<span class="text-red-500">*</span>
                    </label>
                    <div class="p-5 bg-white border border-gray-200 rounded-xl shadow-sm space-y-1">
                        <input type="text" id="workflowName" required minlength="3" maxlength="100"
                            class="w-full h-11 rounded-md border border-gray-300 bg-white px-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                            placeholder="配信名を入力">
                        <p class="text-xs text-gray-500">管理画面上で識別するための名前です。顧客には表示されません。</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-gray-200 text-gray-700 w-5 h-5 rounded-full inline-flex items-center justify-center text-xs font-bold">2</span>
                        配信日 <span class="text-red-500">*</span>
                    </label>
                    <div class="p-5 bg-white border border-gray-200 rounded-xl shadow-sm space-y-1">
                        <input type="date" id="deliveryDate" required
                            class="w-full h-11 rounded-md border border-gray-300 bg-white px-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                        <p class="text-xs text-gray-500">クリエイティブを配信する予定日を選択してください。</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-gray-200 text-gray-700 w-5 h-5 rounded-full inline-flex items-center justify-center text-xs font-bold">3</span>
                        配信媒体 <span class="text-red-500">*</span>
                    </label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="channel" value="google" class="channel-radio sr-only" checked onchange="updateRatioOptions()">
                            <div class="channel-card border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center gap-2 transition-all bg-white hover:border-gray-300">
                                <svg class="w-7 h-7" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                <span class="channel-label text-sm font-semibold text-gray-600 transition-colors">Google</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="channel" value="meta" class="channel-radio sr-only" onchange="updateRatioOptions()">
                            <div class="channel-card border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center gap-2 transition-all bg-white hover:border-gray-300">
                                <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect width="24" height="24" rx="6" fill="#1877F2"/>
                                    <path d="M16.5 8H14c-.3 0-.5.2-.5.5V10H16l-.3 2.5H13.5V19h-2.5v-6.5H9V10h2V8.5C11 6.6 12.3 5 14.5 5H16.5V8z" fill="white"/>
                                </svg>
                                <span class="channel-label text-sm font-semibold text-gray-600 transition-colors">Meta</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="channel" value="yahoo" class="channel-radio sr-only" onchange="updateRatioOptions()">
                            <div class="channel-card border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center gap-2 transition-all bg-white hover:border-gray-300">
                                <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect width="24" height="24" rx="6" fill="#FF0033"/>
                                    <path d="M5 5h3.8l3.2 5.2L15.2 5H19l-5.5 8.8V19h-3v-5.2L5 5z" fill="white"/>
                                </svg>
                                <span class="channel-label text-sm font-semibold text-gray-600 transition-colors">Yahoo</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-gray-200 text-gray-700 w-5 h-5 rounded-full inline-flex items-center justify-center text-xs font-bold">4</span>
                        クリエイティブ形式
                        <span class="text-gray-400 text-xs font-normal">※複数選択可</span>
                    </label>
                    <div id="ratio-grid" class="grid grid-cols-3 gap-3">
                        <label class="relative cursor-pointer">
                            <input type="checkbox" name="ratio" value="1:1" class="ratio-checkbox sr-only" checked>
                            <div class="ratio-card border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center gap-3 transition-all bg-white hover:border-gray-300 h-[110px]">
                                <svg viewBox="0 0 60 60" class="w-10 h-10"><rect class="ratio-rect" x="8" y="8" width="44" height="44" rx="2" fill="none" stroke="#9ca3af" stroke-width="2.5"/></svg>
                                <div class="text-center"><p class="ratio-label text-sm font-semibold text-gray-600 leading-tight">1 : 1</p><p class="text-[11px] text-gray-400 mt-0.5">正方形</p></div>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="checkbox" name="ratio" value="1.91:1" class="ratio-checkbox sr-only">
                            <div class="ratio-card border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center gap-3 transition-all bg-white hover:border-gray-300 h-[110px]">
                                <svg viewBox="0 0 60 60" class="w-10 h-10"><rect class="ratio-rect" x="2" y="16" width="56" height="29" rx="2" fill="none" stroke="#9ca3af" stroke-width="2.5"/></svg>
                                <div class="text-center"><p class="ratio-label text-sm font-semibold text-gray-600 leading-tight">1.91 : 1</p><p class="text-[11px] text-gray-400 mt-0.5">横長</p></div>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="checkbox" name="ratio" value="9:16" class="ratio-checkbox sr-only">
                            <div class="ratio-card border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center gap-3 transition-all bg-white hover:border-gray-300 h-[110px]">
                                <svg viewBox="0 0 60 60" class="w-10 h-10"><rect class="ratio-rect" x="18" y="3" width="24" height="43" rx="2" fill="none" stroke="#9ca3af" stroke-width="2.5"/></svg>
                                <div class="text-center"><p class="ratio-label text-sm font-semibold text-gray-600 leading-tight">9 : 16</p><p class="text-[11px] text-gray-400 mt-0.5">縦長・ストーリーズ</p></div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-gray-200 text-gray-700 w-5 h-5 rounded-full inline-flex items-center justify-center text-xs font-bold">5</span>
                        対象ページURL
                        <span class="text-gray-400 text-xs font-normal">任意</span>
                    </label>
                    <div class="p-5 bg-white border border-gray-200 rounded-xl shadow-sm space-y-3">
                        <div id="url-list" class="space-y-2">
                            <div class="url-row flex items-center gap-2">
                                <input type="url" class="flex-1 h-9 rounded-md border border-gray-300 bg-white px-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="https://example.com/lp">
                                <button type="button" onclick="removeUrlRow(this)" class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors flex-shrink-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                </button>
                            </div>
                        </div>
                        <button type="button" onclick="addUrlRow()" class="inline-flex items-center gap-1.5 text-sm text-gray-600 hover:text-gray-900 font-medium transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                            対象ページURLを追加
                        </button>
                        <p class="text-xs text-gray-500">複数のURLは分けて入力してください。</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-sm font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-gray-200 text-gray-700 w-5 h-5 rounded-full inline-flex items-center justify-center text-xs font-bold">6</span>
                        訴求ポイント
                        <span class="text-gray-400 text-xs font-normal">任意</span>
                    </label>
                    <div class="p-5 bg-white border border-gray-200 rounded-xl shadow-sm space-y-3">
                        <div id="tag-list" class="flex flex-wrap gap-2 empty:hidden"></div>
                        <input type="text" id="tag-input"
                            class="w-full h-9 rounded-md border border-gray-300 bg-white px-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none"
                            placeholder="訴求したいテーマを追加（Enterで追加）">
                        <p class="text-xs text-gray-500">ブランドカラーや特に伝えたいポイントやキーワードを入力してください。</p>
                    </div>
                </div>

                <div class="border border-gray-200 rounded-xl bg-white shadow-sm overflow-hidden">
                    <button type="button" onclick="toggleAdvanced()" class="w-full flex items-center justify-between p-5 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors">
                        <span>詳細オプション</span>
                        <svg id="advanced-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transition-transform text-gray-400"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                    <div id="advanced-panel" class="hidden border-t border-gray-100 p-5 space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-800 mb-1.5">セグメント数</label>
                            <input type="number" id="numberOfSegments" min="1" max="3" value="1"
                                class="w-32 h-10 rounded-md border border-gray-300 bg-white px-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none">
                            <p class="text-xs text-gray-500 mt-1">セグメントの数（1〜3）</p>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-800 mb-1.5">必ず含めたい文言</label>
                            <textarea id="additionalText" rows="4"
                                class="w-full rounded-md border border-gray-300 bg-white p-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none resize-none"
                                placeholder="注意事項など必ず入れたい文言を追加"></textarea>
                        </div>
                    </div>
                </div>

                <div class="sticky bottom-0 bg-gray-50/90 backdrop-blur pt-4 pb-2 flex justify-end gap-3">
                    <button onclick="toggleModal(false)" class="px-5 py-2.5 rounded-md text-sm font-medium border border-gray-300 bg-white text-gray-700 hover:bg-gray-100 transition-colors" type="button">キャンセル</button>
                    <button class="px-5 py-2.5 rounded-md text-sm font-bold bg-gray-900 text-white hover:bg-gray-800 shadow-sm transition-colors flex items-center gap-2" type="submit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                        AI生成を開始する
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const CHANNEL_LABELS = { google: 'Google', meta: 'Meta', yahoo: 'Yahoo' };
    const CHANNEL_RATIOS = {
        google: ['1:1', '1.91:1', '9:16'],
        meta:   ['1:1', '1.91:1', '9:16'],
        yahoo:  ['1:1', '1.91:1', '9:16'],
    };

    function openDetailPage() {
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'hoholine:navigate', page: 'detail' }, '*');
            return;
        }
        window.location.href = './詳細.html';
    }

    function updateRatioOptions() {
        const channel = document.querySelector('input[name="channel"]:checked').value;
        const allowed = CHANNEL_RATIOS[channel] || [];
        document.querySelectorAll('#ratio-grid label').forEach(label => {
            const cb = label.querySelector('.ratio-checkbox');
            if (allowed.includes(cb.value)) { label.style.display = ''; }
            else { label.style.display = 'none'; cb.checked = false; }
        });
        const anyChecked = [...document.querySelectorAll('input[name="ratio"]')].some(c => c.checked && c.closest('label').style.display !== 'none');
        if (!anyChecked) {
            const first = document.querySelector('#ratio-grid label:not([style*="none"]) input');
            if (first) first.checked = true;
        }
    }

    function toggleModal(show) {
        const overlay = document.getElementById('modal-overlay');
        const drawer = document.getElementById('modal-drawer');
        if (show) {
            overlay.classList.remove('hidden');
            setTimeout(() => drawer.classList.remove('translate-x-full'), 10);
        } else {
            drawer.classList.add('translate-x-full');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    }

    function toggleAdvanced() {
        const panel = document.getElementById('advanced-panel');
        const chevron = document.getElementById('advanced-chevron');
        const hidden = panel.classList.toggle('hidden');
        chevron.style.transform = hidden ? '' : 'rotate(180deg)';
    }

    function addUrlRow() {
        const list = document.getElementById('url-list');
        const row = document.createElement('div');
        row.className = 'url-row flex items-center gap-2';
        row.innerHTML = `<input type="url" class="flex-1 h-9 rounded-md border border-gray-300 bg-white px-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="https://example.com/lp">
            <button type="button" onclick="removeUrlRow(this)" class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>`;
        list.appendChild(row);
    }

    function removeUrlRow(btn) {
        const rows = document.querySelectorAll('#url-list .url-row');
        if (rows.length > 1) btn.closest('.url-row').remove();
        else btn.closest('.url-row').querySelector('input').value = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateRatioOptions();
        document.getElementById('tag-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = e.target.value.trim();
                if (val) { addTag(val); e.target.value = ''; }
            }
        });
    });

    function addTag(text) {
        const list = document.getElementById('tag-list');
        const tag = document.createElement('span');
        tag.className = 'tag-item';
        tag.innerHTML = `${escapeHtml(text)}<button type="button" onclick="this.parentElement.remove()" aria-label="削除">✕</button>`;
        list.appendChild(tag);
    }

    function handleCreate(e) {
        e.preventDefault();
        const name    = document.getElementById('workflowName').value;
        const date    = document.getElementById('deliveryDate').value;
        const channel = document.querySelector('input[name="channel"]:checked').value;
        const ratios  = [...document.querySelectorAll('input[name="ratio"]:checked')].map(c => c.value);
        toggleModal(false);
        setTimeout(() => addCard(name, date, channel, ratios), 350);
    }

    function addCard(name, date, channel, ratios) {
        const grid = document.getElementById('card-grid');
        const card = document.createElement('div');
        card.className = "border shadow-sm h-[307px] cursor-pointer hover:shadow-md hover:-translate-y-1 transition-all bg-white border-gray-200 rounded-[14px]";
        card.innerHTML = `
            <div class="p-[25px] flex flex-col gap-[24px] h-full">
                <div class="flex justify-between items-start">
                    <h3 class="text-[16px] font-bold text-gray-900 leading-[22px] line-clamp-2 pr-2">${escapeHtml(name)}</h3>
                    <div class="bg-blue-600 rounded-[8px] px-[9px] py-[3px] flex-shrink-0"><span class="text-[12px] text-white leading-[16px] font-medium">生成中</span></div>
                </div>
                <div class="flex flex-col gap-[12px] flex-1 min-h-0">
                    <div class="flex items-center gap-3 text-[13px] text-gray-500 flex-wrap">
                        <span class="inline-flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            配信日: ${escapeHtml(date)}
                        </span>
                        <span>${escapeHtml(CHANNEL_LABELS[channel] || channel)}</span>
                        ${ratios.map(r => `<span class="bg-gray-100 px-2 py-0.5 rounded text-[11px]">${escapeHtml(r)}</span>`).join('')}
                    </div>
                    <p class="text-[14px] text-gray-600 leading-[22px]">AIがクリエイティブを生成しています...</p>
                </div>
            </div>`;
        grid.appendChild(card);
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
